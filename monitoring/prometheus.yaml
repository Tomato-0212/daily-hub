global:
  scrape_interval: 15s # ให้ไปดึงข้อมูลทุกๆ 15 วินาที

scrape_configs:
  # 1. ให้ Prometheus เก็บข้อมูลของตัวเอง
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. ให้ Prometheus ไปเก็บข้อมูลจาก VM (เป้าหมายหลักของเรา)
  - job_name: 'vm-node-exporter'
    static_configs:
      - targets: ['143.198.215.184:30100'] # เปลี่ยนเป็น IP ของ VM คุณ